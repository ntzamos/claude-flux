###############################################################
# Claude Flux — 2-container stack
#
# Usage:
#   cp .env.example .env          # set POSTGRES_PASSWORD
#   docker compose up -d
#   open http://localhost         # complete onboarding, then use the dashboard
#
# Services:
#   db   — PostgreSQL 16 + pgvector
#   bot  — Telegram relay + web dashboard (Bun + Claude CLI)
###############################################################

name: claude-relay

x-db-url: &db-url
  DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-relay_postgres_pass_2026}@db:5432/postgres

services:
  ###############################################################
  # DATABASE — PostgreSQL 16 with pgvector
  ###############################################################
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-relay_postgres_pass_2026}
      POSTGRES_DB: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - log_min_messages=fatal

  ###############################################################
  # BOT — Telegram relay + web dashboard
  ###############################################################
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:3000"
    environment:
      <<: *db-url
      # All other credentials (TELEGRAM_BOT_TOKEN, ANTHROPIC_API_KEY, etc.)
      # are loaded from the settings table at startup via loadSettings().
    volumes:
      # Everything under /home/relay persists across restarts and rebuilds
      # (Docker initializes the named volume with the image contents on first run)
      - relay-home:/home/relay
      # Shared volume for files generated by Claude
      - relay-files:/files
      # Whisper model files (auto-downloaded on first run, persisted across rebuilds)
      - ./whisper-models:/whisper-models
      # Landing page (bind-mounted so changes take effect without a rebuild)
      - ./docs:/home/relay/app/docs:ro

volumes:
  db-data:
  relay-home:
  relay-files:
